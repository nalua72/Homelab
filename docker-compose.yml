name: homelab

version: "3.9"

services:

  # VPN Container
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    ports:
      - 8080:8080 # solo si necesitas WebUI de gluetun
      - 8989:8989 # Sonarr
      - 7878:7878 # Radarr
      - 9696:9696 # Prowlarr

    volumes:
      - ${HOME}/homelab/gluetun:/gluetun

    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_COUNTRY}
      - FIREWALL=on
      - TZ=${TZ}

    restart: unless-stopped

  # qBittorrent (pasa por VPN)
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080

    volumes:
      - ${HOME}/homelab/qbittorrent/config:/config
      - ${HOME}/homelab/downloads:/downloads

    restart: unless-stopped

  # Prowlarr (pasa por VPN)
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:gluetun

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ${HOME}/homelab/prowlarr/config:/config

    restart: unless-stopped

  # Sonarr (pasa por VPN)
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:gluetun

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ${HOME}/homelab/sonarr/config:/config
      - ${HOME}/homelab/downloads:/downloads
      - ${HOME}/homelab/media/series:/series

    restart: unless-stopped

  # Radarr (pasa por VPN)
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:gluetun

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ${HOME}/homelab/radarr/config:/config
      - ${HOME}/homelab/downloads:/downloads
      - ${HOME}/homelab/media/movies:/movies

    restart: unless-stopped

  # Jellyfin (fuera de VPN, expone puertos al host)
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin

    ports:
      - 8096:8096 # puerto host → contenedor

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - ${HOME}/homelab/jellyfin/config:/config
      - ${HOME}/homelab/jellyfin/cache:/cache
      - ${HOME}/homelab/media:/media

    restart: unless-stopped
