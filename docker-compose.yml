version: "3.9"

services:

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    ports:
      - 8080:8080
      - 3000:3000
      - 9696:9696
      - 8989:8989
      - 7878:7878

    volumes:
      - ./gluetun:/gluetun

    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=Netherlands
      - FIREWALL=on
      - TZ=Europe/Madrid

    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: service:gluetun

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080

    volumes:
      - ./qbittorrent/config:/config
      - ./downloads:/downloads

    restart: unless-stopped

  flood:
    image: jesec/flood
    container_name: flood
    network_mode: service:gluetun

    environment:
      - HOME=/config

    volumes:
      - ./flood/config:/config

    restart: unless-stopped

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    network_mode: service:gluetun

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid

    volumes:
      - ./prowlarr/config:/config

    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    network_mode: service:gluetun

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid

    volumes:
      - ./sonarr/config:/config
      - ./downloads:/downloads
      - ./media/series:/series

    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    network_mode: service:gluetun

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid

    volumes:
      - ./radarr/config:/config
      - ./downloads:/downloads
      - ./media/movies:/movies

    restart: unless-stopped

  jellyfin:
    image: linuxserver/jellyfin
    container_name: jellyfin

    ports:
      - 8096:8096

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid

    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ./media:/media

    restart: unless-stopped
