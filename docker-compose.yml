name: homelab

services:

  # =============================
  # VPN - Gluetun (ProtonVPN)
  # =============================
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    ports:
      - 8080:8080 # qBittorrent WebUI
      - 8989:8989 # Sonarr
      - 7878:7878 # Radarr
      - 9696:9696 # Prowlarr

    volumes:
      - /srv/homelab/gluetun:/gluetun

    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ${OPENVPN_USER}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      SERVER_COUNTRIES: ${VPN_COUNTRY}
      OPENVPN_PROTOCOL: tcp
      FIREWALL: "on"
      TZ: ${TZ}

    restart: unless-stopped

  # =============================
  # qBittorrent (via VPN)
  # =============================
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8080

    volumes:
      - /srv/homelab/qbittorrent/config:/config
      - /srv/homelab/downloads:/downloads

    restart: unless-stopped

  # =============================
  # Prowlarr (via VPN)
  # =============================
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:gluetun

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - /srv/homelab/prowlarr/config:/config

    restart: unless-stopped

  # =============================
  # Sonarr (via VPN)
  # =============================
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: service:gluetun

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - /srv/homelab/sonarr/config:/config
      - /srv/homelab/downloads:/downloads
      - /srv/homelab/media/series:/series

    restart: unless-stopped

  # =============================
  # Radarr (via VPN)
  # =============================
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    network_mode: service:gluetun

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - /srv/homelab/radarr/config:/config
      - /srv/homelab/downloads:/downloads
      - /srv/homelab/media/movies:/movies

    restart: unless-stopped

  # =============================
  # Jellyfin (fuera de VPN)
  # =============================
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin

    ports:
      - 8096:8096

    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}

    volumes:
      - /srv/homelab/jellyfin/config:/config
      - /srv/homelab/jellyfin/cache:/cache
      - /srv/homelab/media:/media

    restart: unless-stopped
